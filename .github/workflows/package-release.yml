name: Package Plugin Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mcp-bridge:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: UnrealClaude/Resources/mcp-bridge

      - name: Build MCP bridge (release)
        run: cargo build --release --target x86_64-pc-windows-msvc
        working-directory: UnrealClaude/Resources/mcp-bridge

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mcp-bridge-windows
          path: UnrealClaude/Resources/mcp-bridge/target/x86_64-pc-windows-msvc/release/ue5-mcp-server.exe

  package:
    runs-on: windows-latest
    needs: build-mcp-bridge
    steps:
      - uses: actions/checkout@v4

      - name: Download MCP bridge binary
        uses: actions/download-artifact@v4
        with:
          name: mcp-bridge-windows
          path: staging/UnrealClaude/Resources/mcp-bridge/

      - name: Validate plugin descriptor
        shell: pwsh
        run: |
          $plugin = Get-Content UnrealClaude/UnrealClaude.uplugin | ConvertFrom-Json
          Write-Host "Plugin: $($plugin.FriendlyName) v$($plugin.VersionName)"
          if ('Win64' -notin $plugin.SupportedTargetPlatforms) {
            Write-Error "Win64 not in SupportedTargetPlatforms"
            exit 1
          }

      - name: Create release package
        shell: pwsh
        run: |
          $plugin = Get-Content UnrealClaude/UnrealClaude.uplugin | ConvertFrom-Json
          $tag = "${{ github.ref_name }}"
          if (-not $tag -or $tag -eq "") { $tag = "v$($plugin.VersionName)" }
          $zipName = "BetterUnrealClaude-${tag}-UE$($plugin.EngineVersion)-Win64.zip"

          # Copy plugin contents to staging
          Copy-Item -Recurse UnrealClaude/* staging/UnrealClaude/ -Force

          # Remove dev-only and build files
          $removePatterns = @('.mcp.json', 'Resources/mcp-bridge/src', 'Resources/mcp-bridge/Cargo.toml', 'Resources/mcp-bridge/target')
          foreach ($p in $removePatterns) {
            $path = "staging/UnrealClaude/$p"
            if (Test-Path $path) { Remove-Item $path -Recurse -Force }
          }

          # Verify binary exists
          if (-not (Test-Path "staging/UnrealClaude/Resources/mcp-bridge/ue5-mcp-server.exe")) {
            Write-Error "MCP bridge binary not found in staging"
            exit 1
          }

          Compress-Archive -Path staging/UnrealClaude -DestinationPath $zipName
          Write-Host "Created $zipName"
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-package
          path: ${{ env.ZIP_NAME }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
